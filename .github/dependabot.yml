# Dependabot dependency-update configuration.
# Keeps npm packages, Rust crates, and GitHub Actions versions current on a
# weekly cadence so known-vulnerable transitive deps are auto-bumped/reported.
# Resolves #1108 (npm + actions) and #1280 (cargo + framework-major ignores).
# Dependabot PRs are skipped by the CodeQL workflow (codeql.yml:
# `if: github.actor != 'dependabot[bot]'`), so bumps are never blocked by SAST.
version: 2
updates:
  # npm dependencies (package-lock.json; CI runs `npm ci`).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "security"
      - "tech-debt"
    # Major bumps for framework packages (Next.js, React, Tauri CLI) cross
    # breaking-API lines and require a coordinated migration PR, so we ignore
    # them here and surface them via the manual roadmap instead.
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tauri-apps/cli"
        update-types: ["version-update:semver-major"]
    # Bundle updates into a single PR per group:
    # - "security": CVE fixes for known-vulnerable deps. Gets its own group so
    #   it can be reviewed and merged quickly without dragging minor/patch
    #   noise into the security fix.
    # - "minor-and-patch": backward-compatible bumps (the historical default).
    # Major bumps are intentionally NOT grouped — each gets its own PR for
    # review since they cross the breaking-change line.
    groups:
      security:
        applies-to: security-updates
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Rust crates consumed by the Tauri host (src-tauri/Cargo.toml + Cargo.lock).
  # The frontend package.json does not carry Rust deps; all of them live here.
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(rust)"
      include: "scope"
    labels:
      - "security"
      - "tech-debt"
    # Bundle semver-compatible minor/patch updates into a single PR so reviewers
    # only have to read one Cargo.lock diff per week. Security fixes get their
    # own group for fast-track review.
    groups:
      security:
        applies-to: security-updates
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used across .github/workflows/* (actions/checkout,
  # actions/setup-node, dtolnay/rust-toolchain, codecov-action, etc.).
  #
  # Without grouping, dependabot opened one PR per action (5+ per week — e.g.
  # PRs #1314-#1318 all bumped a single action in the same window). Bundling
  # cuts the weekly PR stream from N to 1 per category here.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "security"
      - "tech-debt"
    groups:
      # Single weekly PR for all GitHub Actions updates. Action version bumps
      # are essentially never breaking in practice (the actions/* ecosystem
      # uses major bumps for behaviour changes, not API breaks), so a single
      # bundled weekly PR is the right cadence. Reviewers see one diff per
      # week instead of 5+.
      all-actions:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"
