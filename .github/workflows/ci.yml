name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Weekly scheduled run so new npm advisories are caught between PRs (#1108).
  # On the schedule only the `security` audit job runs; every other job is
  # gated with `if: github.event_name != 'schedule'` to skip the weekly trigger.
  schedule:
    - cron: '27 4 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests with coverage
        run: npm test -- --coverage --ci --maxWorkers=2 --forceExit --workerIdleMemoryLimit=512MB
      
      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  
  e2e:
    name: E2E Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck]

    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps chromium
      
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      - name: Upload Playwright screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
  
  lint:
    name: Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
  
  typecheck:
    name: Type Check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run TypeScript type check
        run: npm run typecheck

  commitlint:
    name: Commit Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
      
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate commit messages
        run: npx commitlint --last --verbose

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        # Fail on high/critical advisories. Previously `critical`, which let
        # every high/moderate advisory pass CI silently (#1108).
        run: npm audit --audit-level=high
  
  build:
    name: Build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck, commitlint, security, e2e]
    
    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 7
