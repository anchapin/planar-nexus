name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Weekly scheduled run so new npm advisories are caught between PRs (#1108).
  # On the schedule only the `security` audit job runs; every other job is
  # gated with `if: github.event_name != 'schedule'` to skip the weekly trigger.
  schedule:
    - cron: '27 4 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests with coverage
        run: npm test -- --coverage --ci --maxWorkers=2 --forceExit --workerIdleMemoryLimit=512MB
      
      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  
  e2e:
    name: E2E Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck]

    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps chromium
      
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      - name: Upload Playwright screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7

  flake-detector:
    # Issue #1264: nightly Playwright flake-detector. Runs the suite 5×
    # with `--retries=0` and fails if any spec passes <4/5. Posted as a
    # PR comment when flakes are found, so engineers see the signal
    # without browsing to the Actions tab. Slow (~30 min for the full
    # chromium suite × 5) so it runs on the weekly schedule and on
    # manual dispatch only — never on PRs.
    name: Flake Detector (Playwright)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps chromium

      - name: Run flake detector (5 runs, threshold 4)
        id: flake
        # Capture the exit code; an infra failure must still upload the
        # partial report so the PR comment is useful.
        run: |
          set +e
          npm run test:e2e:flake
          FLAKE_EXIT=$?
          echo "flake-exit=$FLAKE_EXIT" >> "$GITHUB_OUTPUT"
          exit $FLAKE_EXIT
        env:
          CI: 'true'

      - name: Upload flake report (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: flake-detector-report
          path: reports/flake-detector/
          retention-days: 90

      - name: Post PR comment with flake report
        if: github.event_name == 'schedule' && steps.flake.outputs.flake-exit == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Flakes concern the codebase, not a single PR — surface them on
        # every open PR that targets the default branch. Use a hidden
        # marker so re-runs do not duplicate the comment.
        run: |
          set -e
          if [ ! -f reports/flake-detector/report.md ]; then
            echo "No flake report present; skipping PR comment."
            exit 0
          fi
          BASE="${GITHUB_BASE_REF:-main}"
          for pr in $(gh pr list --state open --base "$BASE" --json number --jq '.[].number'); do
            gh pr comment "$pr" --body-file reports/flake-detector/report.md || true
          done
  
  lint:
    name: Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  a11y-contrast:
    name: A11y Color Contrast
    # WCAG 1.4.3 / 1.4.11 design-token audit (#1268). Runs scripts/check-color-contrast.ts
    # which parses `src/app/globals.css`, computes WCAG contrast ratios for every
    # documented foreground/background pair, and fails the build if any pair drops
    # below the AA threshold. Also regenerates docs/CONTRAST_AUDIT.md and uploads
    # it as a workflow artifact so reviewers can read the latest numbers without
    # checking out the branch.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit design-token contrast (WCAG 1.4.3 / 1.4.11)
        run: npm run a11y:contrast:report

      - name: Upload contrast audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: contrast-audit-report
          path: docs/CONTRAST_AUDIT.md
          retention-days: 30
  
  typecheck:
    name: Type Check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run TypeScript type check
        run: npm run typecheck

  commitlint:
    name: Commit Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx commitlint --last --verbose

  mutation-test:
    # Mutation-score gate for the rules-engine invariants (#1265). Runs Stryker
    # against `src/lib/game-state/layer-system.ts` on every PR and surfaces a
    # per-pass threshold of 70% (see stryker.config.js `thresholds.break`). The
    # full allowlist (layer-system, replacement-effects, spell-casting) runs
    # nightly in .github/workflows/mutation.yml — too slow for per-PR CI.
    #
    # `build` depends on this job so a regression below the threshold blocks
    # the merge, mirroring how `coverageThreshold` gates the `test` job.
    name: Mutation Test (layer-system)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Stryker (layer-system only)
        # Per-file scope keeps the PR gate to a single module (~15-20 min on a
        # 2-core runner). The full allowlist (3 modules) runs on the nightly
        # schedule — see .github/workflows/mutation.yml.
        run: npm run mutate:layer-system
        env:
          STRYKER_CONCURRENCY: 4

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report-layer-system
          path: reports/mutation/
          retention-days: 30

  security:
    name: Security Audit (npm)
    runs-on: ubuntu-latest

    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        # Fail on high/critical advisories. Previously `critical`, which let
        # every high/moderate advisory pass CI silently (#1108).
        run: npm audit --audit-level=high

  # Mirror of the `security` job for the Rust crate tree consumed by the Tauri
  # host at `src-tauri/`. Tauri 2 desktop bundles statically link Rust crates,
  # so CVEs in any of them ship into the installer. Resolves #1275.
  cargo-audit:
    name: Security Audit (Rust)
    runs-on: ubuntu-latest

    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit install
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-v0.22

      - name: Install cargo-audit
        # `--locked` makes the toolchain installer pick the exact version
        # referenced in cargo-audit's own Cargo.toml, matching the homebrew
        # release that the docs runbook recommends.
        run: cargo install cargo-audit --locked --version ^0.22 --force

      - name: Run cargo audit
        working-directory: src-tauri
        # `cargo audit` exits non-zero if RustSec advisories with a recognised
        # severity are found. Warnings (unmaintained/unsound/notice) are
        # surfaced but ignored here so the inherited gtk-rs GTK3 binders,
        # which Tauri pulls in via `wry` on Linux, do not break the build
        # until the gtk4-rs migration tracked in the roadmap lands.
        # See docs/RUST_UPGRADE_STRATEGY.md for triage details.
        run: |
          set -e
          cargo audit --json > cargo-audit.json || AUDIT_EXIT=$?
          set -e
          python3 - <<'PY'
          import json, sys
          with open('cargo-audit.json') as fh:
              data = json.load(fh)
          vulns = data.get('vulnerabilities', {}).get('list', []) or []
          order = {'low': 1, 'moderate': 2, 'medium': 2, 'high': 3, 'critical': 4}
          threshold = order['high']
          failing = []
          for v in vulns:
              sev = (v.get('advisory') or {}).get('severity') or ''
              pkg = (v.get('package') or {}).get('name')
              ver = (v.get('package') or {}).get('version')
              aid = (v.get('advisory') or {}).get('id')
              title = (v.get('advisory') or {}).get('title')
              if order.get(sev, 0) >= threshold:
                  failing.append(f"  {aid}: {pkg}@{ver} [{sev}] {title}")
          if failing:
              print("cargo audit: failing advisories (severity >= high):", file=sys.stderr)
              for line in failing:
                  print(line, file=sys.stderr)
              sys.exit(1)
          print(f"cargo audit: {len(vulns)} advisories total; none at severity >= high")
          warnings = data.get('warnings') or {}
          for kind, items in warnings.items():
              print(f"  warning [{kind}]: {len(items)} (informational, not gated)")
          PY
          # Surface cargo-audit's own exit code if the JSON path succeeded
          # but the binary itself reported an error.
          if [ "${AUDIT_EXIT:-0}" -ne 0 ]; then
              echo "cargo audit exited with status ${AUDIT_EXIT}; see cargo-audit.json"
              exit "${AUDIT_EXIT}"
          fi

      - name: Upload cargo-audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cargo-audit-report
          path: src-tauri/cargo-audit.json
          retention-days: 14

  build:
    name: Build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck, commitlint, mutation-test, security, cargo-audit, a11y-contrast, e2e]

    steps:
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: .next/
          retention-days: 7
